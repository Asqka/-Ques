<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Java Quiz Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      background: radial-gradient(circle at 80% 20%, #e9f5fa 0%, #bae6fd 60%, #90caf9 100%);
      overflow-x: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-attachment: fixed;
    }
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      width: 100vw;
      background: transparent;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(70, 170, 255,.14), 0 2px 8px rgba(90, 115, 190, .10);
      padding: 2.5em 2em 2em 2em;
      width: 98vw;
      max-width: 540px;
      min-width: 280px;
      margin: 1.3em 1em 0 1em;
      position: relative;
      transition: box-shadow .25s;
      animation: fadeIn 0.8s cubic-bezier(.77,.22,.42,.98);
      z-index: 10;
    }
    @keyframes fadeIn { from{ opacity:0; transform:translateY(50px);} to{opacity:1;} }
    .logo {
      font-size: 2em;
      font-weight: bold;
      color: #218be6;
      letter-spacing: 1px;
      margin-bottom: 1.3em;
      text-shadow: 0 2px 0 #e3f3ff;
    }
    #questNum {
      color: #5c92ba;
      font-size: .99em;
      margin-bottom: .5em;
      letter-spacing: 1.5px;
      text-align:right;
      float:right;
    }
    #q {
      font-size: 1.22em;
      font-weight: 700;
      min-height: 1.8em;
      margin-bottom: 2.1em;
      color: #256494;
      text-shadow: 0 1px 2px #eaf6fe;
      letter-spacing:.02em;
      margin-right:1em;
    }
    #a {
      width: 99%;
      font-size: 1.06em;
      padding: 1em;
      margin-bottom: 1.1em;
      border-radius: 12px;
      border: 1.7px solid #aad1ee;
      box-sizing: border-box;
      background: #f5faff;
      outline: none;
      transition: border .18s;
    }
    #a:focus {
      border: 2.5px solid #4eb3e9;
      background: #eef7ff;
    }
    button {
      background: linear-gradient(94deg, #4eb3e9 40%, #6fffe9 120%);
      color: #213f60;
      border: 0;
      border-radius: 12px;
      padding: .88em 2.1em;
      font-size: 1.11em;
      font-weight: 500;
      margin-top: .1em;
      margin-bottom: 1.1em;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(33,139,230,.12);
      letter-spacing: .01em;
      transition: background .15s, transform .09s, box-shadow .15s;
    }
    button:active {
      background: linear-gradient(92deg, #51e5e7 13%, #26c6da 87%);
      box-shadow: 0 2px 3px rgba(40,40,60,.1);
      transform: scale(.98);
    }
    #nextBtn {
      float: right;
      background: linear-gradient(102deg, #ffe44d 0%, #ffa751 100%);
      color: #985800;
      margin-top: .7em;
      margin-left: .4em;
      box-shadow:0 2px 10px rgba(230,180,51,.10);
    }
    #feedback {
      min-height: 2em;
      padding: .5em 0 0 .12em;
      font-size: 1.09em;
      font-weight: 500;
      margin-bottom: .5em;
      letter-spacing:.02em;
      transition: color .18s;
      opacity: 1;
    }
    .score {
      font-size: 1.02em;
      color: #2a89b4;
      padding-top: 1.2em;
      text-align:center;
    }
    .bar {
      width: 88%;
      height: 13px;
      border-radius: 9px;
      background: #e7f1fe;
      box-shadow: 0 1px 6px rgba(45,183,255,.07);
      overflow: hidden;
      margin: 20px auto 34px auto;
    }
    .bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #5ee6a8 0%, #48c6ef 80%);
      width: 0;
      border-radius: 7px;
      transition: width .5s cubic-bezier(.7,.11,.66,.95);
      box-shadow: 0 1.5px 6px rgba(90,215,180,.13);
    }
    .footer {
      margin: 18px auto 0 auto;
      text-align:center;
      color:#86b3c5;
      font-size:.99em;
    }

    @media (max-width: 600px){
      .card { padding: 1.1em .3em .8em .8em; }
      .bar { width: 99%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">💡 Java Tester</div>
  <div class="bar"><div class="bar-inner" id="barf"></div></div>
  <div class="card">
    <div id="questNum"></div>
    <div id="q"></div>
    <input type="text" id="a" autocomplete="off" placeholder="Введите ответ...">
    <button onclick="check()">Ответить</button>
    <div id="feedback"></div>
    <button onclick="next()" id="nextBtn" style="display: none;">Следующий вопрос</button>
    <div class="score" id="score"></div>
  </div>
  <div class="footer">© Java Quiz by <b>Asqka</b> | <span style="font-size:1.13em;color:#67c4ff;">☀</span></div>
</div>
<script>
  const qa = [
    {
      q: "Назови 4 принципа ООП.",
      a: "Инкапсуляция - скрытие внутренних деталей класса через private поля и public методы доступа. Наследование - дочерний класс получает поля и методы от родительского класса через extends. Полиморфизм - способность объектов принимать разные формы, реализуется через переопределение методов (@Override) и интерфейсы. Абстракция - выделение главных свойств объекта и скрытие деталей реализации через abstract классы и интерфейсы."
    },
    {
      q: "Чем отличается ООП от функционального программирования?",
      a: "ООП основано на объектах с изменяемым состоянием (mutable), взаимодействие между объектами через методы, императивное программирование. Функциональное программирование основано на функциях как первоклассных объектах, неизменяемость данных (immutable), избегание побочных эффектов, функции высшего порядка (принимают и возвращают функции), декларативный подход. В Java 8+ добавлены элементы ФП: lambda выражения, Stream API, функциональные интерфейсы."
    },
    {
      q: "Что такое паттерн проектирования и их классификация?",
      a: "Паттерн проектирования - типовое, проверенное решение распространённой задачи проектирования. Классифицируются на три группы: Порождающие паттерны (Singleton, Factory, Builder, Abstract Factory, Prototype) - отвечают за создание объектов. Структурные паттерны (Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy) - отвечают за структуру класса и объектов. Поведенческие паттерны (Chain of Responsibility, Command, Interpreter, Iterator, Mediator, Memento, Observer, State, Strategy, Template Method, Visitor) - отвечают за взаимодействие объектов и распределение ответственности."
    },
    {
      q: "Перечисли основные паттерны проектирования.",
      a: "Singleton - гарантирует единственный экземпляр класса в приложении. Factory - создание объектов без указания их конкретных классов через factory методы. Builder - пошаговое создание сложных объектов через builder. Adapter - адаптирует несовместимые интерфейсы. Observer - оповещает множество объектов об изменениях. Strategy - выбирает алгоритм во время выполнения. Decorator - добавляет функциональность к объекту динамически. Proxy - заместитель объекта для контроля доступа. Command - инкапсулирует запрос как объект."
    },
    {
      q: "Главные интерфейсы коллекций и чем они отличаются?",
      a: "List (extends Collection) - упорядоченная коллекция, элементы имеют индекс, допускаются дубликаты и null. Реализации: ArrayList (быстрый доступ), LinkedList (быстрая вставка/удаление). Set (extends Collection) - неупорядоченная коллекция, без дубликатов, может содержать null. Реализации: HashSet (быстрый поиск), TreeSet (отсортирован). Map - коллекция пар ключ-значение, не расширяет Collection. Реализации: HashMap (быстрый доступ), TreeMap (отсортирован по ключам), Hashtable (синхронизирован, старый)."
    },
    {
      q: "Как работает ArrayList?",
      a: "ArrayList - это динамический массив, основан на обычном массиве Object[]. При добавлении элемента за границу текущей ёмкости, массив автоматически расширяется (обычно в 1.5 раза). Быстрый доступ по индексу O(1) потому что это обычный массив. Удаление/вставка в середину O(n) потому что требуется сдвиг элементов. При удалении размер массива не сжимается автоматически. Синхронизация не реализована, для многопоточности нужно Collections.synchronizedList(). Может содержать null значения."
    },
    {
      q: "Как работает LinkedList?",
      a: "LinkedList - это двусвязный список (каждый элемент хранит ссылку на следующий и предыдущий элемент). Реализует интерфейсы List и Deque. Быстрая вставка/удаление O(1) если известна позиция, так как нужно только переписать ссылки. Медленный доступ по индексу O(n) потому что нужно пройтись по цепочке с начала. Оптимален для частых операций вставки/удаления в любом месте коллекции. Может содержать null. Также реализует очередь (Queue) с методами push, pop, peek."
    },
    {
      q: "Чем отличаются ArrayList и LinkedList?",
      a: "ArrayList: доступ по индексу O(1), вставка/удаление O(n), поиск O(n), быстрее итерировать, ниже потребление памяти, лучше для интенсивного чтения. LinkedList: доступ по индексу O(n), вставка/удаление O(1) если известна позиция, поиск O(n), медленнее итерировать, выше потребление памяти (дополнительные ссылки), лучше для частых вставок/удалений в середину. ArrayList выигрывает в большинстве случаев, LinkedList используется редко."
    },
    {
      q: "Как работает HashMap?",
      a: "HashMap - это реализация интерфейса Map на основе хеш-таблицы. Хранит пары ключ-значение в массиве buckets. Хеширование: hashCode ключа определяет индекс в массиве. При коллизии (разные ключи имеют одинаковый hashCode) элементы хранятся в LinkedList (до Java 8) или Red-Black Tree (с Java 8). Средняя сложность O(1) для get/put/remove. Не синхронизирован, для многопоточности используется ConcurrentHashMap. Допускает null как ключ и значение. Начальная ёмкость 16, коэффициент заполнения 0.75."
    },
    {
      q: "В чем отличие TreeMap и HashTable?",
      a: "TreeMap: реализация SortedMap, хранит ключи в отсортированном порядке (по умолчанию natural order), основан на Red-Black Tree, сложность операций O(logn), предсказуемый порядок итерации, поддерживает компаратор, не допускает null ключи, современная реализация. Hashtable: устаревший класс из Java 1.0, синхронизирован (медленнее), неупорядоченный, не допускает null ключи и значения, используется редко, заменён на HashMap с Collections.synchronizedMap(). HashTable - потокобезопасен но медленнее ConcurrentHashMap."
    },
    {
      q: "Как работает HashSet и TreeSet?",
      a: "HashSet: основан на HashMap, хранит уникальные элементы, неупорядоченный (может меняться порядок при расширении), сложность O(1) для add/remove/contains, не синхронизирован, допускает null. Используется HashSet<E> = HashMap<E, Object>() где ключи это элементы. TreeSet: основан на TreeMap, хранит уникальные элементы в отсортированном порядке, сложность O(logn) для операций, предсказуемый порядок итерации в порядке сортировки, поддерживает компаратор, не допускает null. HashSet быстрее когда не нужна сортировка, TreeSet нужен когда нужны элементы в порядке."
    },
    {
      q: "Сложность операций вставки/удаления/сортировки для коллекций?",
      a: "ArrayList: доступ O(1), вставка/удаление O(n), поиск O(n), сортировка O(n logn). LinkedList: доступ O(n), вставка/удаление O(1), поиск O(n), сортировка O(n logn). HashMap/HashSet: вставка O(1) average/O(n) worst case, удаление O(1), поиск O(1), сортировка O(n logn). TreeMap/TreeSet: вставка O(logn), удаление O(logn), поиск O(logn), уже отсортирован. Параллельная сортировка Arrays.parallelSort O(n logn) с использованием нескольких потоков."
    },
    {
      q: "Когда лучше использовать определённую коллекцию?",
      a: "ArrayList - когда нужен быстрый доступ по индексу и частое чтение. LinkedList - редко, только для интенсивных вставок/удалений в начало/конец (лучше использовать ArrayDeque). HashSet - когда нужны уникальные значения и быстрый поиск. TreeSet - когда нужны уникальные значения в отсортированном порядке. HashMap - пары ключ-значение с быстрым доступом. TreeMap - пары ключ-значение в отсортированном порядке по ключам. ConcurrentHashMap - многопоточный доступ к HashMap. ArrayDeque - очередь/стэк, быстрее LinkedList."
    },
    {
      q: "Чем отличаются mutable и immutable переменные, особенности String?",
      a: "Mutable (изменяемые) объекты можно менять после создания, например StringBuilder, ArrayList, обычные классы. Immutable (неизменяемые) объекты нельзя менять, при любой операции создаётся новый объект, например String, Integer, LocalDateTime. String в Java неизменяемый и final, это позволяет кэшировать строки в String Pool в памяти heap. При конкатенации строк '+' создаются новые объекты String. String хешируется один раз и может безопасно использоваться как ключ в HashMap. Основное преимущество immutable - потокобезопасность без синхронизации."
    },
    {
      q: "Что такое StringBuilder и StringBuffer?",
      a: "Оба класса предназначены для работы с изменяемыми строками, нужны когда нужна интенсивная конкатенация строк. StringBuilder - не синхронизирован, поэтому быстрее, используется в однопоточном контексте. StringBuffer - синхронизирован (методы synchronized), медленнее но потокобезопаснее, используется в многопоточном контексте. Оба имеют методы append(), insert(), delete(), replace(), reverse(). При конкатенации много строк StringBuilder/StringBuffer эффективнее чем String '+' потому что не создаёт промежуточные String объекты. StringBuilder рекомендуется использовать в большинстве случаев."
    },
    {
      q: "Какие бывают типы ссылок в Java?",
      a: "StrongReference - обычная ссылка на объект, garbage collector никогда не удалит объект если на него есть strong reference. SoftReference - мягкая ссылка, объект удаляется GC только если не хватает памяти. Используется для кэшей. WeakReference - слабая ссылка, объект может быть удален GC в любой момент даже если хватает памяти. Используется для предотвращения memory leaks. PhantomReference - фантомная ссылка, используется только для отслеживания того когда объект был удален GC, не может вернуть сам объект. Иерархия: Strong > Soft > Weak > Phantom."
    },
    {
      q: "Основные методы Object и их назначение?",
      a: "toString() - возвращает строковое представление объекта, по умолчанию 'ClassName@hashCode', нужно переопределять. equals(Object) - сравнивает два объекта на равенство, по умолчанию сравнивает ссылки (==), нужно переопределять. hashCode() - возвращает хеш-код объекта для использования в HashMap/HashSet, по умолчанию основан на адресе памяти, если переопределяем equals нужно переопределять hashCode. clone() - создает поверхностную копию объекта, класс должен implements Cloneable. finalize() - вызывается GC перед удалением объекта (deprecated с Java 9). wait()/notify()/notifyAll() - для синхронизации потоков, используются в synchronized блоках."
    },
    {
      q: "Что такое equals и hashCode и зачем их переопределять?",
      a: "equals() и hashCode() тесно связаны. equals определяет логическое равенство объектов. hashCode возвращает хеш-код для использования в хеш-коллекциях. Правило: если два объекта равны по equals(), то их hashCode() должны быть одинаковыми. Обратное не обязательно. Нужно переопределять когда хотим сравнивать объекты по содержимому а не по ссылке. Например для User по email, для Product по id. Без правильной реализации объекты не будут работать правильно в HashMap/HashSet (могут быть дубликаты или не найтись объекты). IDE (IntelliJ, Eclipse) могут автогенерировать обе методы."
    },
    {
      q: "Что такое ClassLoader? Какие бывают?",
      a: "ClassLoader - компонент JVM отвечающий за загрузку Java классов в память. Процесс: loading (найти .class файл), linking (проверить, подготовить), initialization (статические переменные). Три встроенных ClassLoader: Bootstrap ClassLoader (родитель, загружает java.lang.*, из java.home/lib/rt.jar, написан на C++), Extension ClassLoader (расширения, из java.home/lib/ext/, загружает классы расширений), Application/System ClassLoader (загружает классы из CLASSPATH, пользовательские классы). Иерархия: Bootstrap -> Extension -> Application. Можно создавать свои ClassLoader для динамической загрузки, горячей замены, изоляции классов."
    },
    {
      q: "Базовые команды Git.",
      a: "git init - инициализирует новый репозиторий в текущей директории. git clone - копирует существующий репозиторий. git add - добавляет файлы в staging area для коммита. git commit -m 'message' - создает коммит с изменениями. git push - отправляет коммиты на удалённый репозиторий. git pull - загружает изменения с удалённого репозитория и объединяет. git status - показывает статус файлов. git log - показывает историю коммитов. git stash - временно сохраняет незакоммиченные изменения. git stash apply - применяет стешированные изменения."
    },
    {
      q: "Что такое git-flow?",
      a: "Git-flow - это модель ветвления для организации разработки в команде. Две основные постоянные ветки: master - содержит только готовый production код, каждый коммит это релиз; develop - ветка разработки, содержит код для следующего релиза. Вспомогательные ветки: feature/* - для разработки новых фич, создаются от develop, мержатся в develop; release/* - подготовка релиза, баг-фиксы, создаются от develop, мержатся в master и develop; hotfix/* - критические баги в production, создаются от master, мержатся в master и develop. Очень популярна в командной разработке."
    },
    {
      q: "Как работают rebase, merge, reset, revert?",
      a: "rebase - переписывает историю коммитов, берет коммиты из текущей ветки и применяет их поверх другой ветки (обычно develop), результат: линейная история без merge commits, используется для локальных веток, никогда не используйте на публичных ветках. merge - объединяет две ветки, создает merge commit, сохраняет полную историю обеих веток, используется для публичных веток. reset - откатывает изменения, может быть soft (staging area не трогается), mixed (по умолчанию, staging area откатывается), hard (рабочая директория тоже откатывается). revert - создает новый коммит который отменяет изменения из указанного коммита, сохраняет историю, безопасен для публичных веток."
    },
    {
      q: "Что такое Map.Entry? Какие в нем поля и для чего?",
      a: "Map.Entry - это static интерфейс находящийся внутри Map интерфейса, представляет одну пару ключ-значение. Поля: K getKey() - возвращает ключ пары, V getValue() - возвращает значение пары, V setValue(V) - устанавливает новое значение. Используется при итерировании по Map через entrySet(). Преимущество перед keySet() или values() что получаем одновременно ключ и значение за одну итерацию вместо двух. Пример: for(Map.Entry<String,Integer> entry : map.entrySet()) { entry.getKey(), entry.getValue() }."
    },
    {
      q: "Что такое коллизия в HashMap?",

    {

      a: "Mapping file - это XML файл или аннотации Java которые определяют как классы отображаются на таблицы БД. Старый способ: .hbm.xml файлы содержат <class>, <property>, <id>, <many-to-one> и т.д. элементы для каждого entity. Современный способ: использовать аннотации @Entity, @Table, @Column, @Id, @OneToMany и т.д. в самом классе (рекомендуется). Пример XML: <class name=\"User\" table=\"users\"><id name=\"id\"><property name=\"name\" column=\"user_name\">. Пример аннотация: @Entity @Table(name=\"users\") public class User { @Id int id; @Column(name=\"user_name\") String name; }."
    },
    {
      q: "Что такое Transient object?",
      a: "Transient object - это entity объект который не хранится в БД и не отслеживается Hibernate (не managed). Может быть: новый объект который не был persisted, detached объект из другой session/transaction. Transient объекты не синхронизируются с БД при flush/commit. Если изменить transient объект и вызвать flush эти изменения не попадут в БД. Чтобы сохранить transient объект нужно вызвать session.save() или session.persist() чтобы он стал managed."
    },
    {
      q: "Persistent object?",
      a: "Persistent object (managed object) - это entity объект который отслеживается Hibernate в контексте текущей session/transaction. Любые изменения в persistent объекте отслеживаются и автоматически сохраняются в БД при flush/commit без явного вызова save/update. Persistent объект синхронизирован с БД. Может быть: только что загружен из БД через session.get()/load(), только что persisted через session.save()/persist(), загружен через query. При close() session persistent объекты становятся detached и перестают отслеживаться."
    },
    {
      q: "Что такое TransactionFactory?",
      a: "TransactionFactory - это интерфейс в Hibernate отвечающий за создание и управление транзакциями, скрывает детали конкретной реализации транзакций (JDBC, JTA и т.д.). Hibernate использует TransactionFactory для создания Transaction объектов. Реализации: JdbcTransactionFactory - JDBC транзакции, JtaTransactionFactory - JTA транзакции (для J2EE контейнеров). Конфигурируется в hibernate.cfg.xml: <property name=\"hibernate.transaction.factory_class\">. Обычно разработчики не взаимодействуют с TransactionFactory напрямую, используют session.beginTransaction()."
    },
    {
      q: "Что такое ConnectionProvider?",
      a: "ConnectionProvider - это абстракция в Hibernate отвечающая за получение JDBC соединений с БД. Скрывает детали как соединения создаются и управляются. Реализации: DriverManagerConnectionProvider - простая реализация через DriverManager, используется для разработки. C3P0ConnectionProvider, DBCPConnectionProvider, HikariCPConnectionProvider - connection pooling провайдеры для production, переиспользуют соединения для производительности. ConnectionProvider конфигурируется в hibernate.cfg.xml. Connection pooling критичен для production потому что создание соединения дорогостоящая операция."
    },
    {
      q: "Что такое транзакция?",
      a: "Транзакция - это набор операций с БД (один или несколько SQL commands) который выполняется как одно атомарное целое. Либо все операции в транзакции выполняются (commit) либо все откатываются (rollback). Промежуточное состояние невозможно. Например: перевод денег между счетами это одна транзакция (вычесть из счета A и добавить на счет B), если вычесть но не добавить это ошибка и откатится. Транзакция гарантирует ACID свойства. В Hibernate: transaction = session.beginTransaction(); ... transaction.commit(); или transaction.rollback(); в catch блоке."
    },
    {
      q: "Стратегии загрузки объектов в Hibernate?",
      a: "EAGER loading - related objects загружаются сразу вместе с parent object, использует JOIN, загружает много данных за раз. LAZY loading (default) - related objects загружаются только когда к ним обращаются, экономит память, но может быть медленнее если нужны все related objects. Выбор зависит от use case: если usually нужны related objects используйте EAGER, если редко используйте LAZY. Можно переопределить в запросе используя fetch join: SELECT DISTINCT a FROM Author a JOIN FETCH a.books. Проблема N+1: при LAZY если загружаем list authors и потом обращаемся к books, будет много queries - решение fetch join."
    },
    {
      q: "Важные аннотации Hibernate?",
      a: "@Entity - отмечает класс как entity. @Table(name=\"...\") - имя таблицы. @Id - первичный ключ. @GeneratedValue(strategy=...) - как генерируется id (AUTO, IDENTITY, SEQUENCE, TABLE). @Column(name=\"...\", nullable=false, unique=true) - отображение поля на колонку. @OneToMany(mappedBy=\"...\", fetch=...) - один-ко-многим. @ManyToOne(fetch=...) - много-к-одному. @ManyToMany(mappedBy=\"...\") - много-ко-многим. @JoinColumn(name=\"...\") - имя foreign key колонки. @Transient - поле которое не отображается на БД."
    },
    {
      q: "Виды кэша в Hibernate?",
      a: "Session cache (L1 cache) - первый уровень, в памяти Session объекта, содержит entity объекты загруженные в текущей session, автоматически управляется. SessionFactory cache (L2 cache) - второй уровень, в памяти SessionFactory, может быть shared между sessions, опциональный требует конфигурации. Query cache - кэширует результаты JPQL запросов. Timestamp cache - для query cache invalidation. Все кэши улучшают производительность избегая повторных запросов к БД. Минусы: требует дополнительную память, нужно управлять cache invalidation когда данные меняются."
    },
    {
      q: "Типы кэша в Hibernate?",
      a: "Read-only cache - кэширует только для чтения, не может быть modified, самый быстрый. Read-write cache - кэширует для чтения и записи, медленнее потому что нужно синхронизировать. Nonstrict-read-write - слабая синхронизация для распределенных систем где eventual consistency приемлема. Transactional - используется с XA транзакциями для строгой консистентности. Replication - кэш реплицируется между nodes в кластере. Выбор зависит от характера данных: frequently read data используйте read-only, mutable data используйте read-write."
    },
    {
      q: "Состояния Entity в Hibernate?",
      a: "Transient - новый entity объект не persisted и не managed, session не знает о нем. Persistent (Managed) - entity является частью session, любые изменения отслеживаются и сохраняются при flush/commit. Detached - entity был persistent но теперь session закрыт, отслеживание прекращено, но объект в памяти существует, можно merge его обратно. Четвертое состояние удаления существует концептуально (marked for deletion) но часто объединяется с transient. Переходы: Transient->Persistent (save/persist), Persistent->Detached (close session), Detached->Persistent (merge), Persistent->Removed (delete, затем commit удаляет из БД)."
    },
    {
      q: "Что такое HQL?",
      a: "HQL (Hibernate Query Language) - это объектно-ориентированный язык запросов похожий на SQL но работающий с entity objects вместо таблиц. Преимущество перед SQL что HQL базирован на объектах поэтому автоматически обрабатывает relationships и inheritance. Синтаксис похож на SQL: SELECT u FROM User u WHERE u.age > 18 (вместо SELECT * FROM users WHERE age > 18). HQL queries выполняются через session.createQuery(hql).list(). Отличие от JPQL (Java Persistence Query Language) что HQL это Hibernate специфичный (но JPQL основан на HQL и очень похожи). Альтернатива: Criteria API для программного построения queries."
    },

// SQL
    {
      q: "Что такое база данных?",
      a: "База данных - это организованное и структурированное хранилище данных обычно в табличной форме, позволяет эффективно хранить, искать, обновлять, удалять данные. База данных управляется СУБД (DBMS - Database Management System) которая обеспечивает ACID гарантии, безопасность, резервные копии. Можно разделить на реляционные (таблицы с relationships, SQL) и NoSQL (документные, ключ-значение, графовые и т.д.). Примеры: PostgreSQL, MySQL, Oracle, SQL Server - реляционные, MongoDB, Redis, Neo4j - NoSQL. База данных критична для большинства приложений как хранилище состояния."
    },
    {
      q: "Модель данных в реляционных СУБД?",

    },
    {
      q: "Что такое нормализация?",

    },
    {
      q: "Типы связей в БД, примеры?",

    },
    {
      q: "primary key — что это?",
      a: "Primary Key (первичный ключ) - это колонка или набор колонок которые уникально идентифицируют каждую строку в таблице, не может быть NULL, значения должны быть уникальные. Обычно это целочисленный id (SERIAL, AUTO_INCREMENT). Назначение: быстро найти конкретную строку, быть target для foreign keys из других таблиц, гарантировать что каждая строка уникальна. Может быть: простой primary key (одна колонка) или составной primary key (несколько колонок). Каждая таблица должна иметь exactly один primary key. Primary key обычно indexed для быстрого доступа."
    },
    {
      q: "foreign key — что это?",
      a: "Foreign Key (внешний ключ) - это колонка или набор колонок которые ссылаются на primary key другой таблицы, организует relationships между таблицами. Пример: таблица Employee имеет foreign key dept_id которая ссылается на id в таблице Department. Foreign key гарантирует referential integrity - нельзя добавить employee с невалидным dept_id. Foreign key может быть NULL (optional relationship). Может быть несколько foreign keys в одной таблице. Foreign key обычно indexed для производительности. Без foreign keys можно было бы добавлять invalid data нарушая consistency."
    },
    {
      q: "Что такое индексы в БД и для чего?",
      a: "Индекс - это структура данных которая ускоряет поиск записей в таблице, работает как индекс в книге позволяя быстро найти записи по определенной колонке. Без индекса БД должна просмотреть всю таблицу (full table scan). Типы индексов: кластерный (clustered) - определяет физический порядок строк в таблице, некластерный (non-clustered) - отдельная структура которая ссылается на строки, уникальный (unique) - гарантирует уникальность, полнотекстовый (full-text) - для поиска текста. Индексы ускоряют SELECT queries но замедляют INSERT/UPDATE/DELETE потому что нужно обновлять индекс. Выбор индексов критичен для оптимизации производительности запросов."
    },
    {
      q: "Типы индекса?",
      a: "Кластерный индекс (clustered) - определяет физический порядок хранения строк в таблице, может быть только один на таблицу, обычно на primary key, быстрейший потому что данные уже отсортированы. Некластерный индекс (non-clustered) - отдельная структура которая отображает колонку на строки, может быть много на таблицу, немного медленнее чем clustered но очень полезен для поиска. Уникальный индекс (unique) - гарантирует что значения в колонке(ах) уникальные, может быть clustered или non-clustered. Полнотекстовый индекс (full-text) - специализирован для поиска текста, использует инвертированный индекс. Составной индекс (composite) - индекс на несколько колонок, порядок колонок важен."
    },
    {
      q: "Что такое SQL?",
      a: "SQL (Structured Query Language) - это язык структурированных запросов для работы с реляционными БД. SQL commands разделяются на категории: DDL (Data Definition Language) - CREATE, ALTER, DROP для структуры БД, DML (Data Manipulation Language) - SELECT, INSERT, UPDATE, DELETE для данных, DCL (Data Control Language) - GRANT, REVOKE для прав, TCL (Transaction Control Language) - COMMIT, ROLLBACK для транзакций. SQL декларативный язык - говорим что хотим получить а не как это получить. SQL standardизирован (ANSI SQL) но каждая СУБД имеет расширения (MySQL, PostgreSQL dialects)."
    },
    {
      q: "Типы JOIN в SQL?",
      a: "INNER JOIN - возвращает только rows где есть совпадение в обеих таблицах, самый распространенный. LEFT JOIN (LEFT OUTER JOIN) - все rows из левой таблицы плюс matching rows из правой, если no match в правой то NULL. RIGHT JOIN (RIGHT OUTER JOIN) - все rows из правой таблицы плюс matching rows из левой, если no match в левой то NULL. FULL JOIN (FULL OUTER JOIN) - все rows из обеих таблиц, если no match то NULL, не все СУБД поддерживают (MySQL не поддерживает). CROSS JOIN - декартово произведение, все комбинации rows из обеих таблиц. SELF JOIN - таблица joinится с собой."
    },
    {
      q: "LEFT JOIN, RIGHT JOIN — в чем отличие?",
      a: "LEFT JOIN - берет ВСЕ записи из левой таблицы (таблица слева от LEFT JOIN) и matching записи из правой таблицы, если нет совпадения в правой то значение NULL. RIGHT JOIN - берет ВСЕ записи из правой таблицы (таблица справа от RIGHT JOIN) и matching записи из левой таблицы, если нет совпадения в левой то значение NULL. Пример: SELECT * FROM employees LEFT JOIN departments - вернет всех employees даже если у них нет department (NULL). SELECT * FROM employees RIGHT JOIN departments - вернет все departments даже если в них нет employees (NULL). LEFT и RIGHT это просто с разных сторон, можно переписать LEFT как RIGHT переставив таблицы."
    },
    {
      q: "Для чего используется HAVING?",
      a: "HAVING - это clause для фильтрации результатов после GROUP BY агрегирования, работает с aggregate functions (COUNT, SUM, AVG, MIN, MAX). WHERE фильтрует individual rows перед группированием, HAVING фильтрует groups после группирования. Пример: SELECT dept, COUNT(*) FROM employees GROUP BY dept HAVING COUNT(*) > 5 - вернет только departments где более 5 employees. HAVING может использовать aggregate functions, WHERE не может. HAVING обычно используется когда нужно фильтровать результаты агрегации."
    },
    {
      q: "DDL, DML, TCL, DCL — что это?",
      a: "DDL (Data Definition Language) - SQL команды для определения структуры БД: CREATE (таблица, индекс, БД), ALTER (изменить структуру), DROP (удалить структуру), TRUNCATE (очистить данные но сохранить структуру). DML (Data Manipulation Language) - SQL команды для работы с данными: SELECT (получить), INSERT (добавить), UPDATE (изменить), DELETE (удалить). TCL (Transaction Control Language) - SQL команды для управления транзакциями: COMMIT (подтвердить транзакцию), ROLLBACK (откатить транзакцию), SAVEPOINT (точка сохранения). DCL (Data Control Language) - SQL команды для прав доступа: GRANT (дать право), REVOKE (отобрать право). Разные команды используются в разных контекстах."
    },
    {
      q: "Общий синтаксис SELECT?",
      a: "SELECT [DISTINCT] column_list FROM table_name WHERE condition GROUP BY column_list HAVING condition ORDER BY column_list [ASC|DESC] LIMIT number OFFSET number. SELECT - какие колонки выбрать. DISTINCT - удалить дубликаты. FROM - из какой таблицы. WHERE - условия для individual rows. GROUP BY - группировать по колоннам. HAVING - условия для groups. ORDER BY - сортировка результатов. LIMIT - максимальное количество rows. OFFSET - пропустить первые N rows (для pagination). Пример: SELECT DISTINCT name FROM users WHERE age > 18 GROUP BY dept HAVING COUNT(*) > 5 ORDER BY name LIMIT 10 OFFSET 20."
    },
    {
      q: "Что такое NULL в SQL?",
      a: "NULL - это специальное значение в SQL для представления отсутствия данных, неизвестное или undefined значение. NULL отличается от пустой строки '' и нуля 0. Если значение NULL то операции с ним обычно возвращают NULL (NULL + 1 = NULL). Для проверки NULL используется IS NULL и IS NOT NULL (не = NULL). COALESCE(col, default) - возвращает первое не-NULL значение. IFNULL(col, default) в MySQL или COALESCE - замена NULL на значение по умолчанию. NULL в агрегирующих функциях: COUNT(*) считает NULL, COUNT(col) не считает NULL, SUM/AVG/MIN/MAX игнорируют NULL. NOT NULL constraint предотвращает NULL в колонке."
    },
    {
      q: "Чем отличаются DISTINCT и GROUP BY?",
      a: "DISTINCT - удаляет дубликатные rows из результата, просто возвращает уникальные комбинации selected колонок. GROUP BY - группирует rows по specified колоннам и обычно используется с aggregate functions. DISTINCT не может использовать aggregate functions. DISTINCT обычно быстрее когда нужны только уникальные values без агрегации. Пример: SELECT DISTINCT city FROM customers - вернет список городов без дубликатов. SELECT city, COUNT(*) FROM customers GROUP BY city - вернет город и количество customers в каждом городе. GROUP BY более мощный потому что дает агрегированную информацию."
    },
    {
      q: "Что делают UNION, INTERSECT, EXCEPT?",
      a: "UNION - объединяет результаты двух SELECT queries в один resultset, удаляет дубликаты, обе queries должны иметь одинаковое количество и типы колонок. UNION ALL - то же что UNION но сохраняет дубликаты, быстрее потому что не проверяет дубликаты. INTERSECT - возвращает только rows которые присутствуют в обеих queries (пересечение). EXCEPT (MINUS в Oracle) - возвращает rows из первой query которые отсутствуют во второй (разница). Пример: SELECT name FROM employees UNION SELECT name FROM contractors - все уникальные имена. SELECT city FROM customers INTERSECT SELECT city FROM suppliers - города где есть и customers и suppliers."
    },
    {
      q: "Что лучше: соединение или подзапросы?",
      a: "JOIN (соединение) - обычно быстрее потому что оптимизатор может построить эффективный план выполнения, использует efficient algorithms (hash join, merge join, nested loop join). Подзапрос (subquery) - обычно медленнее потому что выполняется отдельно и может требовать повторных scans таблицы, особенно correlated subqueries которые выполняются для каждой row. Рекомендация: предпочитайте JOIN когда возможно потому что быстрее и более читаемо. Подзапросы полезны для сложной логики где JOIN было бы слишком громоздко. Модерные оптимизаторы иногда переписывают подзапросы в JOIN если это более эффективно."
    },
    {
      q: "Что делает функция EXISTS?",
      a: "EXISTS - это функция проверяет существует ли result set из подзапроса, возвращает TRUE если есть хотя бы одна row FALSE если нет rows. Обычно используется в WHERE clause. NOT EXISTS - обратное, проверяет что result set пустой. EXISTS обычно более эффективен чем IN когда подзапрос возвращает большой resultset потому что EXISTS останавливается после первого matching row. Пример: SELECT * FROM customers WHERE EXISTS (SELECT 1 FROM orders WHERE orders.customer_id = customers.id) - вернет customers которые имеют orders. Альтернатива: ... WHERE customer_id IN (SELECT customer_id FROM orders) - менее эффективно для больших наборов данных."
    },
    {
      q: "Для чего используется оператор PIVOT?",
      a: "PIVOT - это оператор для преобразования rows в columns (ротация таблицы), берет data из rows и преобразует в columns. Полезен для превращения vertical data в horizontal format. Синтаксис (SQL Server): SELECT * FROM (SELECT col1, col2, col3 FROM table) AS SourceTable PIVOT (SUM(col3) FOR col2 IN ([value1], [value2])) AS PivotTable. Результат: вместо многих rows с col2 values становится несколько columns для каждого col2 value. Не все СУБД поддерживают PIVOT (MySQL требует CASE WHEN statements). Полезен для отчетов где нужны columns вместо rows."
    },
    {
      q: "Что такое хранимая процедура?",
      a: "Хранимая процедура - это SQL код сохраняемый и выполняемый на сервере СУБД, вместо отправки SQL из приложения. Преимущества: производительность - меньше сетевой traffic, повторное использование - процедура может быть вызвана из разных мест, безопасность - может быть более безопасно чем передавать SQL из приложения, переиспользуемость. Синтаксис (зависит от СУБД): CREATE PROCEDURE proc_name (param1 INT) BEGIN SQL statements; END;. Вызов: CALL proc_name(123);. Процедуры могут иметь IN параметры (входные), OUT параметры (выходные), INOUT параметры, могут возвращать resultsets. Java вызывает процедуры через CallableStatement в JDBC."
    },
    {
      q: "Основные свойства транзакции?",
      a: "ACID - четыре критичных свойства. Atomicity (атомарность) - либо всё либо ничего, intermediate state невозможен. Consistency (консистентность) - БД переходит из одного valid состояния в другое, rules и constraints соблюдаются. Isolation (изолированность) - одновременные транзакции не видят друг друга changes до commit, зависит от уровня изоляции. Durability (устойчивость) - после commit данные persistent и выживают сбои. Все четыре критичны для надежной системы с БД. Нарушение любого из них может привести к data corruption или inconsistency."
    },
    {
      q: "Определение третьей нормальной формы БД?",
      a: "Третья нормальная форма (3NF) - это проектирование таблиц где нет транзитивной зависимости неключевых атрибутов от ключа. То есть каждый неключевой атрибут зависит от ключа и ничего больше (не от другого неключевого атрибута). Пример bad (не 3NF): таблица Student с колонками (id, name, dept_id, dept_name) - dept_name зависит от dept_id а не от id, нарушает 3NF. Good (3NF): таблица Student (id, name, dept_id) и таблица Department (dept_id, dept_name) - каждая таблица 3NF. 3NF предотвращает anomalies при обновлении: если изменить dept_name в одной строке и забыть в другой получится inconsistency. Денормализация допустима когда производительность критична но требует careful management."
    },
    {
      q: "Что такое денормализация БД?",
      a: "Денормализация - это intentional нарушение правил нормализации (добавление redundant data) для улучшения производительности запросов, избегаются дорогостоящие JOIN операции. Примеры: добавить calculated fields (вместо JOIN чтобы получить count), дублировать data из других таблиц (redundancy), сохранять pre-calculated aggregates. Плюсы: faster queries потому что меньше JOIN, меньше I/O операций. Минусы: harder to maintain (если изменить data нужно обновить много мест), более сложный код, risk of inconsistency если redundant data не обновлена везде. Денормализацию нужно делать только когда performance критична и базирована на metrics, никогда не денормализируйте без причины."
    },
    {
      q: "Что такое целостность данных и ограничения?",
      a: "Целостность данных - это правильность и консистентность данных в БД, ограничения помогают enforce целостность. Типы ограничений: PRIMARY KEY - уникально идентифицирует каждую строку, UNIQUE - уникальные значения, FOREIGN KEY - referential integrity с другой таблицей, NOT NULL - колонка не может быть NULL, CHECK - условие которое должно быть истинно, DEFAULT - значение по умолчанию если не specified. Ограничения application-level (в коде) менее надежны чем database-level (в СУБД) потому что СУБД всегда enforce даже если приложение broken. Database constraints критичны для предотвращения invalid data."
    },
    {
      q: "Чем отличаются кластерные и некластерные индексы?",
      a: "Кластерный индекс (clustered) - определяет физический порядок как строки хранятся на диске, может быть только один на таблицу (обычно на primary key), когда найдена строка по clustered index данные сразу получены (нет extra I/O). Некластерный индекс (non-clustered) - отдельная структура которая отображает indexed колонку(и) на row locators, может быть много на таблицу, когда найдена строка по non-clustered index нужно получить locator и потом fetch актуальные данные из clustered index или table (extra I/O). Clustered index быстрейший потому что прямо хранит данные. Non-clustered полезны для поиска по non-primary key колоннам. Выбор индексов критичен для query optimization."
    },
    {
      q: "В чем разница между ограничениями primary и unique?",
      a: "PRIMARY KEY - уникально идентифицирует каждую строку, не может быть NULL, может быть только один на таблицу, автоматически indexed. UNIQUE - гарантирует что значения уникальные, МОЖЕТ быть NULL (может быть несколько NULL если NULL поддерживается), может быть несколько UNIQUE constraints на таблицу, может быть indexed или не indexed. PRIMARY KEY обычно используется как главный идентификатор и target для foreign keys. UNIQUE используется для других уникальных значений (email, username и т.д.). Различие важно потому что только PRIMARY KEY может быть target для FOREIGN KEY."
    },

// NoSQL
    {
      q: "Что такое NoSQL?",
      a: "NoSQL - это класс СУБД которые не используют строго реляционную модель данных с таблицами и SQL запросами. Дизайнирован для больших объемов unstructured или semi-structured data. Типы: Document (MongoDB - JSON documents), Key-Value (Redis, Memcached - simple key-value pairs), Graph (Neo4j - nodes and relationships), Column-family (Cassandra, HBase - wide columns). Преимущества: горизонтальная масштабируемость (scale out вместо scale up), гибкая schema (различные структуры в одной коллекции), высокая производительность для specific use cases, eventual consistency вместо strict ACID. Недостатки: less powerful queries, eventual consistency может быть сложно, less mature ecosystem. NoSQL используется для big data, real-time analytics, high traffic applications."
    },
    {
      q: "Какие есть типы хранилищ данных в NoSQL?",
      a: "Документные БД - хранят данные как documents (JSON/BSON), flexibility schema, примеры MongoDB, CouchDB, Firestore. Ключ-значение БД - простые пары key-value, очень быстрые, примеры Redis, Memcached, DynamoDB, используется для caching и sessions. Графовые БД - хранят nodes (entities) и relationships (edges), оптимальны для queries с relationships, примеры Neo4j, используется для social networks, recommendations. Колоночные БД - данные stored в columns вместо rows, оптимальны для OLAP (аналитика), примеры Cassandra, HBase. Search engines - индексируют и ищут text, примеры Elasticsearch, Solr. Каждый тип оптимален для разных use cases."
    },
    {
      q: "Что такое MongoDB?",
      a: "MongoDB - это популярная NoSQL документная БД которая хранит данные в BSON (Binary JSON) формате, гибкая schema позволяет различные структуры документов. Основные концепции: Database - контейнер для collections, Collection - группа documents (похоже на таблицу), Document - единица данных в BSON/JSON (похоже на row). Нет JOIN, вместо этого embedding (вложение документов) или referencing (ссылки). Query language - не SQL а собственный MongoDB query language, примеры: db.users.find({age: {$gt: 18}}). Масштабируемость - horizontal sharding позволяет распределить данные по много серверам. Транзакции введены в MongoDB 4.0 но ограничены. MongoDB популярна для web приложений потому что JSON близко к JavaScript/Java объектам."
    },
    {
      q: "Преимущества MongoDB?",
      a: "Гибкая schema - документы в коллекции могут иметь различные структуры, нет нужды define schema заранее как в реляционных БД. Масштабируемость - horizontal sharding распределяет data по много machines, может обрабатывать больше объемы data. Высокая производительность - оптимизирована для быстрых reads и writes, embedded documents уменьшают JOIN operacii. Простота использования - JSON documents natural для программистов, MongoDB driver доступны для всех языков. Developer friendly - schema flexibility позволяет быстро итерировать и менять структуру data. Replication - встроена поддержка реплики для high availability. Aggregation pipeline - мощный инструмент для data processing."
    },
    {
      q: "Недостатки MongoDB?",
      a: "Нет ACID транзакций на уровне SQL - транзакции limited и введены позже, многие приложения требуют true ACID. Слабая consistency - по умолчанию eventual consistency может привести к inconsistent data если приложение не careful. Нет joins - требует denormalization и embedding что может привести к data duplication. Ограниченная query capability - queries не так powerful как SQL, сложные queries могут быть непрактичны. Document size limit - максимум 16MB на документ (issue для больших documents). Memory usage - может потребовать много памяти для indexes. Как и все NoSQL это trade-off между flexibility и consistency."
    },

// REST
    {
      q: "Что такое REST?",
      a: "REST (Representational State Transfer) - это стиль архитектуры для построения web services над HTTP протоколом, основан на принципах простоты и использования стандартных HTTP методов. REST сервис использует standard HTTP методы: GET (читать), POST (создать), PUT (обновить), DELETE (удалить), PATCH (частичное обновление). Resources - это основное понятие REST, представляют entities (users, products и т.д.), идентифицируются через URLs. REST stateless - каждый request содержит всю информацию нужную для обработки, no session state на сервере. REST widely adopted потому что простой, масштабируемый, используется во всех modern web APIs."

// Spring Core
    {
      q: "Что такое IoC и Dependency Injection?",

    },
    {
      q: "Какие бывают скоупы бинов и какой дефолтный?",
      a: "Singleton (default) - один экземпляр bean на Spring контейнер, переиспользуется для всех requests, экономит память, может быть thread-safe issue если bean stateful. Prototype - новый экземпляр bean создается каждый раз когда запрашивается, медленнее но полезен для stateful beans. Request - новый экземпляр создается для каждого HTTP request в web приложениях, используется в контексте web request. Session - один экземпляр на HTTP session пользователя, используется для session-specific data. Application - один экземпляр на ServletContext, shared между всеми sessions. WebSocket - один экземпляр на WebSocket session. Default Singleton оптимален для большинства случаев потому что stateless beans (services, repositories)."
    },
    {
      q: "Какие существуют типы автоматического связывания?",

    },
    {
      q: "Часто используемые аннотации, разница @Autowired/@Qualifier?",
      a: "@Component - generic annotation для любого bean, @Service - для service beans (бизнес-логика), @Repository - для repository beans (работа с БД), @Controller - для controller beans (web requests). @Autowired - автоматическое внедрение зависимости по типу, можно использовать на field, constructor, setter method. @Qualifier - уточняет какой bean внедрить когда много matching beans, используется вместе с @Autowired: @Autowired @Qualifier(\"beanName\") MyService service;. @Inject - альтернатива @Autowired от javax.inject, стандартный Java. @Resource - альтернатива @Autowired, может быть по типу или имени. Разница @Autowired/@Qualifier: @Autowired по типу, @Qualifier уточняет если много типов, используются вместе когда есть несколько реализаций одного интерфейса."
    },
    {
      q: "Для чего нужен component scan?",

    },
    {
      q: "Разница между @Component и @ComponentScan?",
      a: "@Component - это аннотация которую ставят на класс чтобы indicate что это Spring bean, должен быть registriruem и управляем контейнером. @ComponentScan - это аннотация которую ставят на configuration класс чтобы указать какие пакеты сканировать для поиска @Component аннотированных классов. @Component - объявляет что это bean, @ComponentScan - указывает где искать beans. Пример: @Component public class MyService {} - это bean, @ComponentScan(basePackages=\"com.example\") public class AppConfig {} - ищет beans в этом пакете. Все @Component классы должны быть в пакетах указанные в @ComponentScan иначе они не найдутся и не будут registered."
    },
    {
      q: "Для чего используется аннотация @Bean?",
      a: "@Bean - это аннотация на метод в @Configuration класса которая explicitly declares что возвращаемое значение это Spring bean который должен быть зарегистрирован в контейнере. Используется когда нужен более explicit контроль над созданием bean чем @Component. Преимущества: можно передать параметры конструктору, можно вызвать методы при создании, можно conditional bean creation. Пример: @Bean public DataSource dataSource() { return new DataSource(url, user, password); }. Бин создается только один раз (singleton по умолчанию) и переиспользуется. @Bean более мощен чем @Component для complex setup но менее convenient для простых случаев."
    },
    {
      q: "Разница @Bean и @Component?",
      a: "@Component - аннотация на класс которая автоматически регистрирует его как bean, используется когда контроль над созданием не нужен, более удобная и автоматическая. @Bean - аннотация на метод в configuration класса который явно создает и регистрирует bean, дает полный контроль над инстанцированием, нужна для third-party классов которые нельзя аннотировать или когда нужна complex logic. @Component проще и требует меньше кода, @Bean более explicit и для complex cases. Правило: используй @Component для своих классов, @Bean для external libraries или complex logic."
    },
    {
      q: "Разница @Component, @Service, @Repository?",
      a: "@Component - generic annotation для любого Spring bean, используется когда нет более specific annotations. @Service - специализация @Component для business logic layer, указывает что класс содержит business logic, semantically более clear. @Repository - специализация @Component для data access layer, указывает что класс работает с БД, Spring автоматически translate database exceptions на Spring DataAccessException. Технически все три одинаковы (наследуются от @Component) но семантически разные указывают слой приложения. Использование правильной аннотации делает код более читаемым и maintains layer separation, Spring также может добавлять layer-specific behavior (например @Repository для exception translation)."
    },
    {
      q: "Можно ли использовать @Component вместо @Service для бизнес-логики?",
      a: "Да, технически @Component работает точно также как @Service потому что @Service это просто специализация @Component, оба регистрируют class как bean. Однако это не рекомендуется потому что: семантика - @Service явно indicates что это business logic layer, читаемость - другие разработчики сразу понимают что это сервис а не generic component, future extensions - Spring может добавить service-specific behavior в будущем (например Aspect для service layer). Хорошая практика: используй @Service для классов в service/business logic слое, @Repository для data access, @Controller для web controllers, @Component для других. Это делает архитектуру clear и maintainable."
    },
    {
      q: "Как инжектить нужный бин при нескольких бинах? @Primary/@Qualifier?",
      a: "@Primary - аннотация на @Bean или @Component которая указывает что это preferred bean когда есть multiple candidates того же типа, используется когда есть default реализация которую нужна в большинстве случаев. @Qualifier - аннотация которая specifies имя бина который нужно внедрить, используется вместе с @Autowired: @Autowired @Qualifier(\"beanName\") MyService service;. @Primary удобна когда есть один default bean, @Qualifier когда нужно явно выбрать. Пример: @Bean @Primary public PaymentStrategy creditCard() {} и @Bean public PaymentStrategy paypal() {} - creditCard инжектится по умолчанию, но можно @Qualifier(\"paypal\") для paypal. Комбинация: если много @Bean одного типа используй @Primary для одного и @Qualifier для других."
    },
    {
      q: "Как выбрать бин через application.properties?",

    }

  let i = 0;
  let score = 0;
  let total = qa.length;

  function showQ() {
    document.getElementById('questNum').textContent = (i + 1) + "/" + total;
    document.getElementById('q').textContent = qa[i].q;
    document.getElementById('a').value = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('nextBtn').style.display = 'none';
    document.querySelector('button[onclick="check()"]').style.display = 'inline-block';
    progressBar(i, total);
  }

  function check() {
    let user = document.getElementById('a').value.toLowerCase().trim();
    let correct = qa[i].a.toLowerCase();
    let sim = similarity(user, correct);

    if (sim > 0.7) {
      document.getElementById('feedback').textContent = '✅ Верно!';
      document.getElementById('feedback').style.color = '#4CAF50';
      score++;
    } else {
      document.getElementById('feedback').textContent = 'Ответ: ' + qa[i].a;
      document.getElementById('feedback').style.color = '#000000';
    }

    document.querySelector('button[onclick="check()"]').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('score').textContent = `Правильно: ${score}/${i + 1}`;
  }

  function next() {
    i++;
    if (i < total) {
      showQ();
    } else {
      document.getElementById('q').textContent = "🎉 Вы прошли все вопросы!";
      document.getElementById('a').style.display = 'none';
      document.querySelector('button[onclick="check()"]').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('score').textContent = `Итог: ${score} из ${total}`;
      progressBar(total, total);
      document.getElementById('feedback').textContent = "";
    }
  }

  function similarity(s1, s2) {
    s1 = s1.split(/\s+/).filter(Boolean);
    s2 = s2.split(/\s+/).filter(Boolean);
    let match = s1.filter(w => s2.includes(w)).length;
    return match / Math.max(s1.length, s2.length);
  }

  function progressBar(cur, total){
    let pc = Math.round((cur)/total*100);
    document.getElementById('barf').style.width = `${pc}%`;
  }

  document.getElementById('a').addEventListener('keydown', e => {
    if(e.key==="Enter") check();
  });

  showQ();
</script>
</body>
</html>
